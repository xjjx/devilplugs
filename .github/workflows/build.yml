name: Build XjTF
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
          libgl1-mesa-dev libasound2-dev \
          libfreetype6-dev libfontconfig1-dev

    - name: Get VST2 SDK
      run: git clone https://github.com/R-Tur/VST_SDK_2.4.git

    - name: Cache juceaide
      uses: actions/cache@v3
      with:
        path: build/juce
        key: juceaide-linux-${{ hashFiles('juce/CMakeLists.txt') }}

    - name: Build
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -- -j$(nproc)

    - name: Collect Artifacts
      run: |
        mkdir -p release
        find build -name "*.so" -path "*/VST/*"  -exec mv {} release/ \;
        find build -type d -name "*.vst3" -path "*/VST3/*" -exec mv {} release/ \;
        find build -type d -name "*.lv2" -path "*/LV2/*"  -exec mv {} release/ \;

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: release/**

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Get VST2 SDK
      run: git clone https://github.com/R-Tur/VST_SDK_2.4.git

    - name: Cache juceaide
      uses: actions/cache@v3
      with:
        path: build/juce
        key: juceaide-linux-${{ hashFiles('juce/CMakeLists.txt') }}

    - name: Build
      run: |
        cmake -B build -S . -G "Visual Studio 17 2022" -A x64
        cmake --build build --config Release --parallel

    - name: Collect Artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force release | Out-Null
        Get-ChildItem build -Recurse -Include *.dll  | Move-Item -Destination release\
        Get-ChildItem build -Recurse -Include *.vst3 | Move-Item -Destination release\
        Get-ChildItem build -Recurse -Include *.lv2  | Move-Item -Destination release\

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: release/**

  release:
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux
        path: artifacts/Linux

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: artifacts/Windows

    - name: Package
      run: |
        COMMIT=$(git rev-parse --short HEAD)
        zip -r XjTF-$COMMIT.zip artifacts/
        echo "ZIP=XjTF-$COMMIT.zip" >> $GITHUB_ENV

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        files: ${{ env.ZIP }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
